<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Tech for Us</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages redirect script
      // This script takes the current url and converts the path and query string
      // into just a query string, and then redirects the browser to the new url
      // with only a query string and hash fragment.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') + '/?p=/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
